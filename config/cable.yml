# Async adapter only works within the same process, so for manually triggering cable updates from a console,
# and seeing results in the browser, you must do so from the web console (running inside the dev process),
# not a terminal started via bin/rails console! Add "console" to any action or any ERB template view
# to make the web console appear.
development:
  adapter: async

# System tests drive a real browser that subscribes over a websocket to the
# in-process Puma test server; the async adapter actually pushes Turbo Stream
# broadcasts to it (the `test` adapter only captures them in-process and never
# reaches the browser, so live-update system tests can't see them).
test:
  adapter: async

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
