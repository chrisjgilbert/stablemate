# Fixtures are inserted via raw SQL (callbacks/validations are skipped), so every
# NOT NULL column — including ping_token, which the model normally auto-fills —
# must be set explicitly here. Monitors belong to a project now (projects.md §10):
# each references a fixture project (project: alices_default) and no longer sets
# `user:` — the column is gone.
pending:
  project: alices_default
  monitor_type: heartbeat
  name: Nightly backup
  ping_token: fixture_pending_token_aaaaaaaaaaaaaaaa
  expected_interval_seconds: 3600
  grace_period_seconds: 300
  status: pending
  source: manual

up:
  project: alices_default
  monitor_type: heartbeat
  name: Hourly sync
  ping_token: fixture_up_token_bbbbbbbbbbbbbbbbbbbb
  expected_interval_seconds: 3600
  grace_period_seconds: 300
  status: up
  last_ping_at: <%= 10.minutes.ago.utc.iso8601 %>
  next_due_at: <%= 50.minutes.from_now.utc.iso8601 %>
  source: manual

# Registered from the gem (source: gem) — drives the gem-chip system test (S14).
gem_synced:
  project: alices_default
  monitor_type: heartbeat
  name: daily_digest
  ping_token: fixture_gem_token_dddddddddddddddddd
  expected_interval_seconds: 86400
  grace_period_seconds: 3600
  status: pending
  source: gem
  registration_key: daily_digest

# Owned by bob — used to prove tenant isolation (alice must get a 404).
bobs:
  project: bobs_default
  monitor_type: heartbeat
  name: Bobs job
  ping_token: fixture_bobs_token_cccccccccccccccc
  expected_interval_seconds: 3600
  grace_period_seconds: 300
  status: up
  last_ping_at: <%= 10.minutes.ago.utc.iso8601 %>
  next_due_at: <%= 50.minutes.from_now.utc.iso8601 %>
  source: manual
