# Auto-deploy Stablemate to the Hetzner VM with Kamal — but only once CI is green.
#
# This runs on `workflow_run`, i.e. AFTER the CI workflow finishes, and deploys
# only when that run was on `main` and concluded `success`. So the gate is
# literally "CI passed on main" — the same bin/ci that guards every push. A red
# suite never reaches the server.
#
# It ships the exact commit CI validated (workflow_run.head_sha), builds the
# amd64 image on the runner, pushes to Docker Hub, and rolls it out over SSH with
# `kamal deploy` (migrations run on boot). This replaces the manual
# `bin/kamal deploy` — the config it uses (config/deploy.yml + .kamal/secrets) is
# identical; only the values come from repo Secrets/Variables instead of your
# shell. See docs/deploy-hetzner-cloudflare.md → "Auto-deploy from CI".
#
# Required GitHub → Settings → Secrets and variables → Actions
#   Variables:  KAMAL_REGISTRY_USER, STABLEMATE_SERVER_IP, STABLEMATE_HOST
#   Secrets:    KAMAL_REGISTRY_PASSWORD, RAILS_MASTER_KEY,
#               STABLEMATE_DATABASE_PASSWORD, STABLEMATE_SSL_CERT,
#               STABLEMATE_SSL_KEY, SSH_PRIVATE_KEY
name: Deploy

on:
  workflow_run:
    workflows: ["CI"]        # must match the `name:` in ci.yml
    types: [completed]
    branches: [main]

# Never let two deploys race; if a newer green commit lands mid-deploy, let the
# running one finish (don't cancel a half-applied rollout).
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    # Deploy only for a CI run that (a) passed, (b) was triggered by a `push`
    # (not a pull_request), and (c) came from THIS repo — never a fork.
    #
    # The `branches: [main]` filter above is NOT a security control: it matches
    # the triggering run's head_branch, which for a fork PR is the attacker's
    # source-branch name — a fork branch literally named `main` would slip
    # through. Requiring event == 'push' excludes every fork-PR-triggered run
    # (only someone with write access can push to main), and the head_repository
    # check rejects fork provenance outright. Without these, Deploy would check
    # out workflow_run.head_sha (untrusted fork code) and run it — bundle install
    # + kamal deploy — with every production secret in scope. Defense in depth:
    # either guard closes the hole; we keep both.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Deployment target — non-secret, from repo Variables. deploy.yml reads
      # these via ERB (image/registry user, servers + db host, proxy host).
      KAMAL_REGISTRY_USER: ${{ vars.KAMAL_REGISTRY_USER }}
      STABLEMATE_SERVER_IP: ${{ vars.STABLEMATE_SERVER_IP }}
      STABLEMATE_HOST: ${{ vars.STABLEMATE_HOST }}
      # Secrets — consumed by .kamal/secrets (env-first, file fallback).
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      STABLEMATE_DATABASE_PASSWORD: ${{ secrets.STABLEMATE_DATABASE_PASSWORD }}
      STABLEMATE_SSL_CERT: ${{ secrets.STABLEMATE_SSL_CERT }}
      STABLEMATE_SSL_KEY: ${{ secrets.STABLEMATE_SSL_KEY }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

    steps:
      - name: Check out the commit CI validated
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Ruby (gives us bin/kamal)
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.KAMAL_REGISTRY_USER }}
          password: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}

      - name: Add the server's SSH key
        # Read the secret from env (never inline ${{ }} into the script) and
        # write it with a guaranteed trailing newline — ssh rejects a key that
        # lacks one. Fail loudly if key-scanning the host turns up nothing,
        # rather than leaving known_hosts empty for kamal to trip over later.
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$STABLEMATE_SERVER_IP" >> ~/.ssh/known_hosts
          grep -q . ~/.ssh/known_hosts || { echo "ssh-keyscan found no host key for $STABLEMATE_SERVER_IP (is port 22 reachable from the runner?)" >&2; exit 1; }

      - name: kamal deploy
        run: bin/kamal deploy
