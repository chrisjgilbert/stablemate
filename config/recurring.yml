# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

# Detection sweep cadence is DETECTION_INTERVAL (config/initializers/stablemate.rb
# = 30.seconds). Solid Queue's recurring schedule is static YAML, so the literal
# "every 30 seconds" must track that constant if it ever changes.
#
# Dev and production share the same schedule (anchor below). In development the
# sweep only fires while a Solid Queue worker is running — start one with
# `bin/jobs` (alongside `bin/rails server`) so monitors actually go down locally.
default: &default
  detect_missed_pings:
    class: DetectMissedPingsJob
    schedule: every 30 seconds
  # Daily uptime rollup: aggregates each monitor's previous complete day(s) into
  # UptimeDayStat. Backfills any missed days on the next run. (Phase 2 §3.1)
  rollup_uptime:
    class: RollupUptimeJob
    schedule: every day at 00:10
  # Daily pruning of raw PingEvents older than PING_RETENTION. Runs after the
  # rollup so a day's stats exist before its raw pings are deleted (the job also
  # safety-checks this per day). (Phase 2 §3.3)
  prune_ping_events:
    class: PrunePingEventsJob
    schedule: every day at 00:40
  # Daily backstop for the involuntary-downgrade grace period: settles any account
  # whose choose-N window expired unanswered, keeping the oldest FREE_PLAN cap and
  # clearing the lock. Nothing is suspended before the deadline. (projects.md §7, §12-J)
  enforce_overdue_downgrades:
    class: EnforceOverdueDowngradesJob
    schedule: every day at 01:00
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

development:
  <<: *default

production:
  <<: *default
