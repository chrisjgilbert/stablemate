# Stablemate — Kamal deploy config for a single Hetzner VM behind Cloudflare.
#
# The three deployment-specific values (registry user, server IP, public host)
# are read from ENV so the exact same config drives both a manual deploy and the
# GitHub Actions auto-deploy (.github/workflows/deploy.yml). Set them once — on
# your laptop export KAMAL_REGISTRY_USER / STABLEMATE_SERVER_IP / STABLEMATE_HOST
# (see docs/deploy-hetzner-cloudflare.md), in CI they come from repo Variables —
# then:
#   bin/kamal setup     # first time (provisions kamal-proxy + the db accessory)
#   bin/kamal deploy    # subsequent releases
#
# TLS is terminated by kamal-proxy on the box using a Cloudflare *Origin
# Certificate* (see docs/install.md → "Deploying on Hetzner behind Cloudflare").
# Cloudflare SSL/TLS mode must be "Full (strict)". No Caddy/nginx needed.

# Name of your application. Used to uniquely configure containers.
service: stablemate

# Name of the container image. On Docker Hub this is <registry-user>/stablemate.
image: <%= ENV.fetch("KAMAL_REGISTRY_USER") %>/stablemate

# Deploy to these servers. STABLEMATE_SERVER_IP is your Hetzner VM's public IP.
servers:
  web:
    - <%= ENV.fetch("STABLEMATE_SERVER_IP") %>

# kamal-proxy terminates TLS on the host and load-balances to the app container —
# no Caddy, nginx, or extra certs. This box sits behind Cloudflare (orange cloud)
# with the firewall locked to Cloudflare's IPs (see docs/install.md), so we serve a
# Cloudflare Origin Certificate (custom cert, name-secrets in .kamal/secrets)
# rather than Let's Encrypt: with ACME unable to reach the box, an Origin Cert
# needs no challenge and never renews. Set Cloudflare SSL/TLS mode to "Full
# (strict)".
#
# Self-hosting WITHOUT Cloudflare (or not locking the firewall)? Automatic Let's
# Encrypt is simpler — replace the whole `ssl:` block below with a bare `ssl: true`
# and point DNS straight at the box. See docs/install.md.
proxy:
  ssl:
    certificate_pem: STABLEMATE_SSL_CERT
    private_key_pem: STABLEMATE_SSL_KEY
  host: <%= ENV.fetch("STABLEMATE_HOST") %>   # e.g. status.example.com — must match STABLEMATE_HOST below

# Where you keep your container images.
registry:
  # Alternatives: hub.docker.com (omit server) / ghcr.io / registry.digitalocean.com / ...
  # server: ghcr.io
  username: <%= ENV.fetch("KAMAL_REGISTRY_USER") %>

  # Always use an access token rather than a real password. Pulled from .kamal/secrets.
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
#
# Secrets choice: RAILS_MASTER_KEY. With it present Rails derives secret_key_base
# from encrypted credentials, so there's no SECRET_KEY_BASE here. SMTP can live in
# credentials too (production.rb falls back to credentials.smtp when SMTP_* env is
# unset). The DB password is the one secret credentials can't supply — database.yml
# reads it from the environment — so it's passed explicitly below.
env:
  clear:
    # Public hostname. Ping URLs and every email link are built from this, and it
    # enables Host-header authorization. Must match the Cloudflare host above.
    STABLEMATE_HOST: <%= ENV.fetch("STABLEMATE_HOST") %>
    STABLEMATE_PROTOCOL: https
    STABLEMATE_MAIL_FROM: "Stablemate <alerts@stablemate.dev>"
    STABLEMATE_MAIL_REPLY_TO: support@stablemate.dev

    # This box sits behind Cloudflare, so trust CF's edge ranges to recover the
    # real client IP (ping rate limiter + session log). Drop this if you front the
    # app with something else and set STABLEMATE_TRUSTED_PROXIES instead.
    STABLEMATE_BEHIND_CLOUDFLARE: true

    # The app container reaches the bundled Postgres accessory by its Kamal
    # container name on the shared `kamal` docker network.
    DB_HOST: stablemate-db

    # Run the Solid Queue Supervisor inside Puma so one box does web + jobs.
    # Split this out to a dedicated `job` role once you add a second machine.
    SOLID_QUEUE_IN_PUMA: true

    # Launch signup cap (issue #16 / phase-4): cap new accounts at 1 while
    # validating demand. Raise (or remove) manually to re-open signups
    # (locked decision #7).
    STABLEMATE_SIGNUP_ACCOUNT_CAP: 1

    # Cores available to the app on the server (default: 1). Bump for a bigger VM.
    WEB_CONCURRENCY: 2

    # Log level (debug may include PII).
    # RAILS_LOG_LEVEL: info
  secret:
    - RAILS_MASTER_KEY
    # DB password — shared with the Postgres accessory below so the two can't drift.
    - STABLEMATE_DATABASE_PASSWORD

# Aliases are triggered with "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Persist Active Storage uploads written to /rails/storage across releases.
# Recommended to back this path up off-server.
volumes:
  - "stablemate_storage:/rails/storage"

# Bridge fingerprinted assets between versions to avoid 404s on in-flight requests.
asset_path: /rails/public/assets

# Configure the image builder. Hetzner VMs are amd64.
builder:
  arch: amd64

# Use accessory services (secrets come from .kamal/secrets).
#
# Bundled PostgreSQL 16 on the same host, reachable as `stablemate-db` on the
# kamal docker network. Data persists in the host-mounted ./data directory — back
# it up (see docs/runbook.md §1). On first boot the app's entrypoint runs
# `db:prepare`, which creates+migrates the primary plus the Solid
# Cache/Queue/Cable databases (the POSTGRES_USER is a superuser, so it can).
accessories:
  db:
    image: postgres:16
    host: <%= ENV.fetch("STABLEMATE_SERVER_IP") %>
    # Bind to localhost only — Postgres is never exposed to the public internet;
    # the app reaches it over the private kamal docker network.
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: stablemate
        POSTGRES_DB: stablemate_production
      secret:
        # Must equal STABLEMATE_DATABASE_PASSWORD (both mapped in .kamal/secrets).
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
