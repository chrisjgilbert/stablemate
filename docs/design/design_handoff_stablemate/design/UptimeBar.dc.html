<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;align-items:flex-end;gap:2px;width:100%;height:34px">
  <sc-for list="{{ days }}" as="d" hint-placeholder-count="90">
    <sc-if value="{{ d.up }}" hint-placeholder-val="{{ true }}"><div title="{{ d.label }}" style="flex:1 1 0;min-width:0;height:100%;border-radius:2px;background:#22c55e"></div></sc-if>
    <sc-if value="{{ d.partial }}"><div title="{{ d.label }}" style="flex:1 1 0;min-width:0;height:100%;border-radius:2px;background:#f59e0b"></div></sc-if>
    <sc-if value="{{ d.down }}"><div title="{{ d.label }}" style="flex:1 1 0;min-width:0;height:100%;border-radius:2px;background:#ef4444"></div></sc-if>
    <sc-if value="{{ d.none }}"><div title="{{ d.label }}" style="flex:1 1 0;min-width:0;height:100%;border-radius:2px;background:#e4e4e7"></div></sc-if>
  </sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:540,&quot;height&quot;:34},&quot;days&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;Array&lt;{up?:boolean,down?:boolean,partial?:boolean,none?:boolean,label?:string}&gt;&quot;}}"></script>
</body>
</html>
