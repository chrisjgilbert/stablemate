# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

# The companion gem (gem/) is a separate codebase with its own toolchain and
# conventions; it is not linted by the host app's rubocop run.
AllCops:
  Exclude:
    - "gem/**/*"
    # Vendored migrations copied verbatim from the Pay gem's install generator
    # (issue #19). We keep them as generated rather than drift from upstream, so
    # they are exempt from our house style. (CLAUDE.md "Use Rails, don't fight it".)
    - "db/migrate/*.pay.rb"

# Overwrite or add rules to create your own house style
#
# # Use `[a, [b, c]]` not `[ a, [ b, c ] ]`
# Layout/SpaceInsideArrayLiteralBrackets:
#   Enabled: false
